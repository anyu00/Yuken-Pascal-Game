<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Main body -->
  <rect x="15" y="20" width="130" height="120" rx="12" fill="#263238"/>
  <rect x="22" y="27" width="116" height="106" rx="8" fill="#37474F"/>
  <!-- Label -->
  <rect x="30" y="34" width="100" height="22" rx="4" fill="#B71C1C"/>
  <text x="80" y="50" font-size="10" text-anchor="middle" fill="white" font-weight="bold">YUKEN PISTON</text>
  <!-- Pistons (3 cylinders) -->
  <rect x="36" y="65" width="20" height="50" rx="5" fill="#546E7A"/>
  <rect x="70" y="65" width="20" height="50" rx="5" fill="#546E7A"/>
  <rect x="104" y="65" width="20" height="50" rx="5" fill="#546E7A"/>
  <!-- Piston rods -->
  <rect x="44" y="58" width="4" height="16" rx="2" fill="#90A4AE"/>
  <rect x="78" y="52" width="4" height="22" rx="2" fill="#90A4AE"/>
  <rect x="112" y="60" width="4" height="14" rx="2" fill="#90A4AE"/>
  <!-- Piston heads -->
  <ellipse cx="46" cy="57" rx="8" ry="5" fill="#78909C"/>
  <ellipse cx="80" cy="51" rx="8" ry="5" fill="#78909C"/>
  <ellipse cx="114" cy="59" rx="8" ry="5" fill="#78909C"/>
  <!-- Drive shaft -->
  <rect x="30" y="118" width="100" height="12" rx="4" fill="#455A64"/>
  <!-- Port -->
  <rect x="130" y="75" width="20" height="16" rx="4" fill="#546E7A"/>
  <!-- Bolts -->
  <circle cx="26" cy="32" r="4" fill="#78909C"/>
  <circle cx="134" cy="32" r="4" fill="#78909C"/>
  <circle cx="26" cy="138" r="4" fill="#78909C"/>
  <circle cx="134" cy="138" r="4" fill="#78909C"/>
</svg>
