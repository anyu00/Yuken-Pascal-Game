<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Main valve body -->
  <rect x="40" y="25" width="120" height="70" rx="8" fill="#1A237E"/>
  <rect x="46" y="31" width="108" height="58" rx="5" fill="#283593"/>
  <!-- Label -->
  <rect x="55" y="38" width="90" height="18" rx="3" fill="#B71C1C"/>
  <text x="100" y="51" font-size="9" text-anchor="middle" fill="white" font-weight="bold">YUKEN D-VALVE</text>
  <!-- Spool symbol (center) -->
  <rect x="70" y="62" width="60" height="26" rx="3" fill="#1A237E"/>
  <!-- Left box (flow path A) -->
  <rect x="70" y="62" width="28" height="26" rx="2" fill="#1565C0"/>
  <line x1="76" y1="68" x2="92" y2="82" stroke="white" stroke-width="2"/>
  <polygon points="90,68 98,68 94,75" fill="white"/>
  <!-- Right box (flow path B) -->
  <rect x="102" y="62" width="28" height="26" rx="2" fill="#0D47A1"/>
  <line x1="108" y1="82" x2="124" y2="68" stroke="white" stroke-width="2"/>
  <polygon points="108,74 116,68 112,82" fill="white"/>
  <!-- Solenoid left -->
  <rect x="0" y="40" width="42" height="40" rx="5" fill="#37474F"/>
  <rect x="5" y="45" width="32" height="30" rx="3" fill="#455A64"/>
  <text x="21" y="64" font-size="8" text-anchor="middle" fill="#90A4AE">SOL A</text>
  <rect x="38" y="55" width="8" height="10" rx="2" fill="#546E7A"/>
  <!-- Solenoid right -->
  <rect x="158" y="40" width="42" height="40" rx="5" fill="#37474F"/>
  <rect x="163" y="45" width="32" height="30" rx="3" fill="#455A64"/>
  <text x="179" y="64" font-size="8" text-anchor="middle" fill="#90A4AE">SOL B</text>
  <rect x="154" y="55" width="8" height="10" rx="2" fill="#546E7A"/>
  <!-- Ports bottom -->
  <rect x="58" y="93" width="14" height="18" rx="3" fill="#546E7A"/>
  <rect x="80" y="93" width="14" height="18" rx="3" fill="#546E7A"/>
  <rect x="102" y="93" width="14" height="18" rx="3" fill="#546E7A"/>
  <rect x="124" y="93" width="14" height="18" rx="3" fill="#546E7A"/>
  <text x="65" y="107" font-size="7" text-anchor="middle" fill="#ccc">P</text>
  <text x="87" y="107" font-size="7" text-anchor="middle" fill="#ccc">A</text>
  <text x="109" y="107" font-size="7" text-anchor="middle" fill="#ccc">B</text>
  <text x="131" y="107" font-size="7" text-anchor="middle" fill="#ccc">T</text>
</svg>
