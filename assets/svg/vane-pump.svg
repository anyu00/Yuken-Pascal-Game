<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <!-- Body -->
  <rect x="20" y="30" width="120" height="100" rx="14" fill="#37474F"/>
  <rect x="28" y="38" width="104" height="84" rx="10" fill="#455A64"/>
  <!-- Yuken-style label plate -->
  <rect x="36" y="46" width="88" height="22" rx="4" fill="#B71C1C"/>
  <text x="80" y="62" font-size="11" text-anchor="middle" fill="white" font-weight="bold">YUKEN VANE</text>
  <!-- Center rotor circle -->
  <circle cx="80" cy="95" r="30" fill="#546E7A"/>
  <circle cx="80" cy="95" r="22" fill="#37474F"/>
  <!-- Vanes -->
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(0,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(45,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(90,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(135,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(180,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(225,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(270,80,95)"/>
  <rect x="78" y="65" width="4" height="22" rx="2" fill="#90A4AE" transform="rotate(315,80,95)"/>
  <!-- Shaft -->
  <circle cx="80" cy="95" r="8" fill="#78909C"/>
  <circle cx="80" cy="95" r="4" fill="#37474F"/>
  <!-- Inlet port -->
  <rect x="2" y="85" width="20" height="20" rx="4" fill="#546E7A"/>
  <rect x="6" y="89" width="12" height="12" rx="2" fill="#37474F"/>
  <!-- Outlet port -->
  <rect x="138" y="85" width="20" height="20" rx="4" fill="#546E7A"/>
  <rect x="142" y="89" width="12" height="12" rx="2" fill="#37474F"/>
  <!-- Bolts -->
  <circle cx="32" cy="44" r="4" fill="#78909C"/>
  <circle cx="128" cy="44" r="4" fill="#78909C"/>
  <circle cx="32" cy="126" r="4" fill="#78909C"/>
  <circle cx="128" cy="126" r="4" fill="#78909C"/>
</svg>
