<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 180" width="140" height="180">
  <!-- Body -->
  <rect x="25" y="70" width="90" height="80" rx="12" fill="#4A148C"/>
  <rect x="32" y="77" width="76" height="66" rx="8" fill="#6A1B9A"/>
  <!-- "Blockage" symbol on body -->
  <circle cx="70" cy="110" r="22" fill="#311B92" stroke="#CE93D8" stroke-width="2"/>
  <line x1="54" y1="94" x2="86" y2="126" stroke="#CE93D8" stroke-width="4" stroke-linecap="round"/>
  <circle cx="70" cy="110" r="14" fill="none" stroke="#CE93D8" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="70" cy="52" rx="32" ry="30" fill="#4A148C"/>
  <!-- Evil eyes -->
  <ellipse cx="56" cy="46" rx="10" ry="8" fill="#FF6F00"/>
  <ellipse cx="84" cy="46" rx="10" ry="8" fill="#FF6F00"/>
  <ellipse cx="56" cy="46" rx="6" ry="5" fill="#E65100"/>
  <ellipse cx="84" cy="46" rx="6" ry="5" fill="#E65100"/>
  <circle cx="57" cy="46" r="3" fill="#212121"/>
  <circle cx="85" cy="46" r="3" fill="#212121"/>
  <circle cx="58" cy="45" r="1" fill="white"/>
  <circle cx="86" cy="45" r="1" fill="white"/>
  <!-- Evil brow -->
  <path d="M46 38 Q56 32 64 38" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M76 38 Q84 32 94 38" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Evil grin -->
  <path d="M52 62 Q70 74 88 62" stroke="#CE93D8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <line x1="58" y1="66" x2="58" y2="72" stroke="#CE93D8" stroke-width="2"/>
  <line x1="66" y1="69" x2="66" y2="74" stroke="#CE93D8" stroke-width="2"/>
  <line x1="74" y1="69" x2="74" y2="74" stroke="#CE93D8" stroke-width="2"/>
  <line x1="82" y1="66" x2="82" y2="72" stroke="#CE93D8" stroke-width="2"/>
  <!-- Horns -->
  <polygon points="44,28 36,8 52,22" fill="#6A1B9A"/>
  <polygon points="96,28 104,8 88,22" fill="#6A1B9A"/>
  <!-- Arms -->
  <rect x="0" y="78" width="28" height="14" rx="7" fill="#4A148C"/>
  <rect x="112" y="78" width="28" height="14" rx="7" fill="#4A148C"/>
  <!-- Claws -->
  <path d="M4 85 Q0 78 6 74" stroke="#CE93D8" stroke-width="2" fill="none"/>
  <path d="M4 85 Q-2 86 2 92" stroke="#CE93D8" stroke-width="2" fill="none"/>
  <path d="M126 85 Q130 78 124 74" stroke="#CE93D8" stroke-width="2" fill="none"/>
  <path d="M126 85 Q132 86 128 92" stroke="#CE93D8" stroke-width="2" fill="none"/>
  <!-- Legs -->
  <rect x="36" y="148" width="22" height="28" rx="6" fill="#4A148C"/>
  <rect x="82" y="148" width="22" height="28" rx="6" fill="#4A148C"/>
  <!-- Feet -->
  <ellipse cx="47" cy="176" rx="16" ry="7" fill="#311B92"/>
  <ellipse cx="93" cy="176" rx="16" ry="7" fill="#311B92"/>
  <!-- Name -->
  <rect x="22" y="84" width="96" height="14" rx="3" fill="#212121" opacity="0.6"/>
  <text x="70" y="95" font-size="8" text-anchor="middle" fill="#CE93D8" font-weight="bold">THE BLOCKAGE</text>
</svg>
