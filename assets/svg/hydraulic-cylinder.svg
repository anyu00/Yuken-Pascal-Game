<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" width="220" height="100">
  <!-- Cylinder barrel -->
  <rect x="30" y="25" width="140" height="50" rx="8" fill="#37474F"/>
  <rect x="35" y="30" width="130" height="40" rx="5" fill="#455A64"/>
  <!-- End cap left -->
  <rect x="10" y="20" width="28" height="60" rx="6" fill="#546E7A"/>
  <rect x="14" y="25" width="20" height="50" rx="4" fill="#607D8B"/>
  <!-- End cap right -->
  <rect x="162" y="20" width="28" height="60" rx="6" fill="#546E7A"/>
  <!-- Piston rod -->
  <rect x="188" y="42" width="30" height="16" rx="4" fill="#90A4AE"/>
  <!-- Rod end clevis -->
  <circle cx="220" cy="50" r="10" fill="#78909C"/>
  <circle cx="220" cy="50" r="5" fill="#546E7A"/>
  <!-- Piston inside (visible) -->
  <rect x="130" y="28" width="18" height="44" rx="3" fill="#78909C"/>
  <!-- Port A -->
  <rect x="55" y="8" width="16" height="18" rx="3" fill="#546E7A"/>
  <rect x="59" y="4" width="8" height="8" rx="2" fill="#455A64"/>
  <text x="63" y="15" font-size="7" text-anchor="middle" fill="#ccc">A</text>
  <!-- Port B -->
  <rect x="135" y="8" width="16" height="18" rx="3" fill="#546E7A"/>
  <rect x="139" y="4" width="8" height="8" rx="2" fill="#455A64"/>
  <text x="143" y="15" font-size="7" text-anchor="middle" fill="#ccc">B</text>
  <!-- Label -->
  <rect x="60" y="37" width="90" height="16" rx="3" fill="#B71C1C"/>
  <text x="105" y="49" font-size="8" text-anchor="middle" fill="white" font-weight="bold">YUKEN CYLINDER</text>
  <!-- Mount bracket -->
  <rect x="12" y="74" width="24" height="10" rx="3" fill="#37474F"/>
  <rect x="164" y="74" width="24" height="10" rx="3" fill="#37474F"/>
</svg>
