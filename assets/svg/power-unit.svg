<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 200" width="180" height="200">
  <!-- Tank -->
  <rect x="10" y="80" width="160" height="110" rx="10" fill="#263238"/>
  <rect x="16" y="86" width="148" height="98" rx="7" fill="#37474F"/>
  <!-- Tank label -->
  <rect x="30" y="100" width="120" height="22" rx="4" fill="#B71C1C"/>
  <text x="90" y="116" font-size="10" text-anchor="middle" fill="white" font-weight="bold">YUKEN POWER UNIT</text>
  <!-- Oil level gauge -->
  <rect x="150" y="92" width="12" height="60" rx="4" fill="#546E7A"/>
  <rect x="152" y="112" width="8" height="36" rx="3" fill="#00BCD4" opacity="0.8"/>
  <text x="156" y="106" font-size="6" text-anchor="middle" fill="#ccc">OIL</text>
  <!-- Motor on top -->
  <rect x="20" y="20" width="80" height="64" rx="10" fill="#37474F"/>
  <rect x="26" y="26" width="68" height="52" rx="7" fill="#455A64"/>
  <ellipse cx="60" cy="52" rx="24" ry="24" fill="#546E7A"/>
  <ellipse cx="60" cy="52" rx="16" ry="16" fill="#37474F"/>
  <ellipse cx="60" cy="52" rx="6" ry="6" fill="#78909C"/>
  <text x="60" y="30" font-size="7" text-anchor="middle" fill="#90A4AE">MOTOR</text>
  <!-- Pump on top right -->
  <rect x="110" y="30" width="56" height="50" rx="8" fill="#263238"/>
  <rect x="115" y="35" width="46" height="40" rx="5" fill="#37474F"/>
  <circle cx="138" cy="55" r="14" fill="#546E7A"/>
  <circle cx="138" cy="55" r="8" fill="#37474F"/>
  <circle cx="138" cy="55" r="3" fill="#90A4AE"/>
  <!-- Connecting shaft -->
  <rect x="96" y="48" width="16" height="8" rx="3" fill="#78909C"/>
  <!-- Pressure gauge -->
  <circle cx="40" cy="148" r="18" fill="#546E7A"/>
  <circle cx="40" cy="148" r="14" fill="#263238"/>
  <circle cx="40" cy="148" r="10" fill="#37474F"/>
  <line x1="40" y1="148" x2="47" y2="140" stroke="#F44336" stroke-width="2" stroke-linecap="round"/>
  <text x="40" y="172" font-size="6" text-anchor="middle" fill="#90A4AE">PRESSURE</text>
  <!-- Ports -->
  <rect x="70" y="178" width="16" height="14" rx="3" fill="#546E7A"/>
  <rect x="100" y="178" width="16" height="14" rx="3" fill="#546E7A"/>
  <text x="78" y="190" font-size="6" text-anchor="middle" fill="#ccc">P</text>
  <text x="108" y="190" font-size="6" text-anchor="middle" fill="#ccc">T</text>
  <!-- Bolts -->
  <circle cx="20" cy="92" r="4" fill="#78909C"/>
  <circle cx="160" cy="92" r="4" fill="#78909C"/>
  <circle cx="20" cy="180" r="4" fill="#78909C"/>
  <circle cx="160" cy="180" r="4" fill="#78909C"/>
</svg>
