<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <!-- Hard hat -->
  <ellipse cx="60" cy="38" rx="36" ry="10" fill="#FFD700"/>
  <rect x="24" y="30" width="72" height="18" rx="9" fill="#FFD700"/>
  <rect x="20" y="42" width="80" height="6" rx="3" fill="#FFA500"/>
  <!-- Face -->
  <circle cx="60" cy="65" r="26" fill="#FFDAB9"/>
  <!-- Eyes -->
  <circle cx="50" cy="60" r="5" fill="white"/>
  <circle cx="70" cy="60" r="5" fill="white"/>
  <circle cx="51" cy="61" r="3" fill="#333"/>
  <circle cx="71" cy="61" r="3" fill="#333"/>
  <circle cx="52" cy="60" r="1" fill="white"/>
  <circle cx="72" cy="60" r="1" fill="white"/>
  <!-- Smile -->
  <path d="M50 73 Q60 82 70 73" stroke="#c0704a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <ellipse cx="34" cy="65" rx="5" ry="7" fill="#FFDAB9"/>
  <ellipse cx="86" cy="65" rx="5" ry="7" fill="#FFDAB9"/>
  <!-- Body - overalls -->
  <rect x="32" y="90" width="56" height="60" rx="10" fill="#1565C0"/>
  <!-- Collar -->
  <rect x="44" y="88" width="32" height="16" rx="4" fill="#0D47A1"/>
  <!-- Overalls straps -->
  <rect x="44" y="88" width="10" height="30" rx="4" fill="#0D47A1"/>
  <rect x="66" y="88" width="10" height="30" rx="4" fill="#0D47A1"/>
  <!-- Pocket -->
  <rect x="50" y="118" width="20" height="16" rx="3" fill="#0D47A1"/>
  <!-- Wrench in pocket -->
  <rect x="57" y="112" width="4" height="18" rx="2" fill="#90A4AE"/>
  <!-- Arms -->
  <rect x="10" y="90" width="24" height="12" rx="6" fill="#1565C0"/>
  <rect x="86" y="90" width="24" height="12" rx="6" fill="#1565C0"/>
  <!-- Hands -->
  <circle cx="16" cy="108" r="9" fill="#FFDAB9"/>
  <circle cx="104" cy="108" r="9" fill="#FFDAB9"/>
  <!-- Legs -->
  <rect x="36" y="148" width="20" height="26" rx="6" fill="#0D47A1"/>
  <rect x="64" y="148" width="20" height="26" rx="6" fill="#0D47A1"/>
  <!-- Boots -->
  <rect x="32" y="168" width="28" height="12" rx="5" fill="#333"/>
  <rect x="60" y="168" width="28" height="12" rx="5" fill="#333"/>
  <!-- Name badge -->
  <rect x="46" y="100" width="28" height="14" rx="3" fill="white"/>
  <text x="60" y="111" font-size="7" text-anchor="middle" fill="#1565C0" font-weight="bold">PASCAL</text>
</svg>
