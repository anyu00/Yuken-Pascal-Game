<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Hydraulic Mayhem: Toilet Rescue</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;
         width:100vw;height:100vh;overflow:hidden;}
    #game canvas{display:block;touch-action:none;}
  </style>
</head>
<body>
<div id="game"></div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   CONTENT — Edit everything here for branding / text / tips
═══════════════════════════════════════════════════════════ */
const CONTENT = {
  brand: {
    name:    'YUKEN',
    tagline: 'Powered by Hydraulic Technology',
    url:     'https://www.yuken.co.jp',
    model:   'YK-500 PRESSURE LAUNCHER',
  },
  tips: [
    '⚙️ Real hydraulic systems power aircraft, excavators & factories!',
    '💧 Pascal\'s Law: Pressure in a fluid spreads equally in ALL directions!',
    '🔧 Yuken hydraulic pumps generate up to 350 bar of pressure!',
    '🏗️ A small hydraulic force can lift cars, cranes — even skyscrapers!',
  ],
  failMsgs: [
    '😱 The businessman is still dangling!\n🌭 Toilet landed in a hotdog cart!',
    '💥 OVERPRESSURE! Pod flew to the MOON!\n🚀 That\'s not the rescue target...',
    '🐦 Pigeons hijacked your rescue pod!\n😂 Try a different pressure level!',
    '💩 Wrong floor! That was the JANITOR\'S toilet!\n🤣 Adjust your pressure!',
    '😅 Pod bounced off a billboard!\n📢 "YUKEN: Even our FAILURES are powerful!"',
  ],
  winTitle:  '🎉 BUSINESSMAN RESCUED!',
  winHint:   '⚙️ Real Yuken hydraulic systems use this pressure to power factories!',
};
/* ═══════════════════════════════════════════════════════════ */

const W = 800, H = 520;

/* ────────────────────── MENU SCENE ────────────────────── */
class MenuScene extends Phaser.Scene {
  constructor() { super({ key: 'MenuScene' }); }

  create() {
    this.cameras.main.fadeIn(600);
    const g = this.add.graphics();

    // Sky
    g.fillGradientStyle(0x0d3b6e, 0x0d3b6e, 0x1a6faf, 0x1a6faf, 1);
    g.fillRect(0, 0, W, H);

    // City silhouette
    const blds = [
      [0,340,70,180],[80,300,55,220],[150,320,80,200],[260,350,50,170],
      [590,310,65,210],[670,290,80,230],[760,320,60,200],
    ];
    g.fillStyle(0x0a1628);
    blds.forEach(([x,y,w,h]) => {
      g.fillRect(x, y, w, h);
      // Windows
      for (let wy=y+12; wy<y+h-10; wy+=24)
        for (let wx=x+8; wx<x+w-8; wx+=18) {
          g.fillStyle(Math.random()>0.4 ? 0xFFDD88 : 0x334466, 0.6);
          g.fillRect(wx, wy, 9, 13);
        }
    });

    // Ground
    g.fillStyle(0x1a1a0e); g.fillRect(0, H-30, W, 30);
    g.fillStyle(0x2a2a1e); g.fillRect(0, H-33, W, 5);

    // Stars
    for (let i=0; i<60; i++) {
      const s = Math.random()*2+0.5;
      g.fillStyle(0xffffff, Math.random()*0.7+0.3);
      g.fillCircle(Math.random()*W, Math.random()*150, s);
    }

    // Animated clouds
    this._clouds = [];
    [[120,55],[310,40],[560,65],[700,45]].forEach(([x,y]) => {
      const cg = this.add.graphics();
      cg.fillStyle(0xffffff, 0.12);
      cg.fillCircle(0,0,35); cg.fillCircle(28,8,26);
      cg.fillCircle(-24,10,22); cg.fillCircle(12,-14,20);
      cg.setPosition(x, y);
      this._clouds.push({ g: cg, spd: 8+Math.random()*8 });
    });

    // Spinning toilet
    const toilet = this.add.text(W/2, 68, '🚽', { fontSize: '70px' }).setOrigin(0.5);
    this.tweens.add({ targets: toilet, y: 80, duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });
    this.tweens.add({ targets: toilet, angle: -10, duration: 1100, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    // Title
    const t1 = this.add.text(W/2, 162, 'HYDRAULIC MAYHEM', {
      fontSize: '50px', fontFamily: 'Fredoka One, Arial Black',
      color: '#FFE135', stroke: '#000', strokeThickness: 9
    }).setOrigin(0.5);
    this.tweens.add({ targets: t1, y: 157, duration: 1300, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    this.add.text(W/2, 218, '🚽  TOILET  RESCUE  🚽', {
      fontSize: '28px', fontFamily: 'Fredoka One, Arial Black',
      color: '#FF6B6B', stroke: '#000', strokeThickness: 5
    }).setOrigin(0.5);

    // PLAY button
    this._btn(W/2, 308, 240, 68, 0xCC2222, '🚀  PLAY NOW!', 36, () => {
      this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.start('GameScene'));
    });

    // HOW TO PLAY button
    this._btn(W/2, 388, 200, 46, 0x226699, '❓ How to Play', 22, () => {
      this._howToPlay();
    });

    // Best score
    const best = localStorage.getItem('hm_best') || '---';
    this.add.text(W/2, 450, `🏆 Best Score: ${best}`, {
      fontSize: '22px', fontFamily: 'Fredoka One', color: '#FFE135', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);

    // Brand + tip
    const tip = Phaser.Utils.Array.GetRandom(CONTENT.tips);
    this.add.text(W/2, 492, '⚙️ ' + CONTENT.brand.name + ' · ' + tip, {
      fontSize: '10px', fontFamily: 'Arial', color: '#7799bb', align: 'center', wordWrap: { width: W-40 }
    }).setOrigin(0.5);
  }

  _howToPlay() {
    const ov = this.add.graphics();
    ov.fillStyle(0x000000, 0.82); ov.fillRect(0, 0, W, H);

    const box = this.add.graphics();
    box.fillStyle(0x1a3a5e); box.fillRoundedRect(W/2-220, H/2-200, 440, 400, 20);
    box.lineStyle(3, 0x88CCFF); box.strokeRoundedRect(W/2-220, H/2-200, 440, 400, 20);

    const lines = [
      '🚽 HOW TO PLAY',
      '',
      'HOLD the big red button to charge',
      'hydraulic pressure, then RELEASE to fire!',
      '',
      '🔵 LOW  pressure → short, weak shot',
      '🟢 PERFECT pressure → rescue arc! 🎯',
      '🔴 OVER pressure → CHAOS & explosions! 💥',
      '',
      'Hit 🌀 FANS & 🐦 BIRDS for bonus score!',
      'Land on the 🎯 platform to rescue him!',
      '',
      '⚙️ YK-500 · ' + CONTENT.brand.tagline,
    ];
    const txt = this.add.text(W/2, H/2-150, lines.join('\n'), {
      fontSize: '15px', fontFamily: 'Fredoka One, Arial', color: '#ffffff',
      align: 'center', lineSpacing: 8, stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5, 0);

    const closeG = this.add.graphics();
    closeG.fillStyle(0xFF4444); closeG.fillRoundedRect(W/2-70, H/2+165, 140, 40, 10);
    closeG.lineStyle(2, 0x000); closeG.strokeRoundedRect(W/2-70, H/2+165, 140, 40, 10);
    const closeT = this.add.text(W/2, H/2+185, '✔ Got it!', {
      fontSize: '20px', fontFamily: 'Fredoka One', color: '#fff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);

    const hit = this.add.rectangle(W/2, H/2+185, 140, 40).setInteractive().setAlpha(0.001);
    hit.on('pointerdown', () => { [ov, box, txt, closeG, closeT, hit].forEach(o => o.destroy()); });
  }

  _btn(cx, cy, bw, bh, col, label, fs, cb) {
    const g = this.add.graphics();
    const draw = (c) => {
      g.clear();
      g.fillStyle(c); g.fillRoundedRect(cx-bw/2, cy-bh/2, bw, bh, 14);
      g.lineStyle(4, 0x000); g.strokeRoundedRect(cx-bw/2, cy-bh/2, bw, bh, 14);
    };
    draw(col);
    const t = this.add.text(cx, cy, label, {
      fontSize: fs+'px', fontFamily: 'Fredoka One, Arial Black', color: '#fff', stroke: '#000', strokeThickness: 4
    }).setOrigin(0.5);
    const hit = this.add.rectangle(cx, cy, bw, bh).setInteractive().setAlpha(0.001);
    hit.on('pointerover', () => { draw(col+0x181818); this.tweens.add({ targets: [g, t], scaleX: 1.04, scaleY: 1.04, duration: 80 }); });
    hit.on('pointerout',  () => { draw(col);           this.tweens.add({ targets: [g, t], scaleX: 1,    scaleY: 1,    duration: 80 }); });
    hit.on('pointerdown', () => {
      this.cameras.main.shake(80, 0.005);
      this.tweens.add({ targets: t, scaleX: 0.92, scaleY: 0.92, duration: 80, yoyo: true });
      cb();
    });
  }

  update(t) {
    this._clouds.forEach(c => {
      c.g.x -= c.spd * (1/60);
      if (c.g.x < -120) c.g.x = W + 60;
    });
  }
}

/* ────────────────────── GAME SCENE ────────────────────── */
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }

  init() {
    this.pressure    = 0;
    this.isCharging  = false;
    this.launched    = false;
    this.gameOver    = false;
    this.score       = 0;
    this.combo       = 1;
    this.airtime     = 0;
    this.pod         = null;
    this.podEmoji    = null;
    this.fanAngle    = [0, 45];
    this.birdTimer   = 2000;
    this.birds       = [];
    this.billboardHit= false;
    this.craneDir    = 1;
    this.craneAng    = 0;
    this.trailPts    = [];
    this.clouds      = [];
  }

  create() {
    this.cameras.main.fadeIn(500);

    /* ── BACKGROUND ──────────────────────────────────── */
    const sky = this.add.graphics();
    sky.fillGradientStyle(0x87CEEB, 0x87CEEB, 0xC8E8FF, 0xC8E8FF, 1);
    sky.fillRect(0, 0, W, H);

    // Sun + rays
    const sunG = this.add.graphics();
    sunG.fillStyle(0xFFE135); sunG.fillCircle(W-80, 60, 36);
    sunG.fillStyle(0xFFCC00); sunG.fillCircle(W-80, 60, 28);
    for (let i=0; i<8; i++) {
      const a = i*Math.PI/4;
      sunG.lineStyle(3, 0xFFDD44, 0.7);
      sunG.beginPath();
      sunG.moveTo(W-80+Math.cos(a)*40, 60+Math.sin(a)*40);
      sunG.lineTo(W-80+Math.cos(a)*58, 60+Math.sin(a)*58);
      sunG.strokePath();
    }

    // Animated clouds
    [[100,55,0.5],[290,42,0.7],[490,60,0.4],[660,48,0.6]].forEach(([x,y,spd]) => {
      const cg = this.add.graphics();
      cg.fillStyle(0xffffff, 0.88);
      cg.fillCircle(0,0,30); cg.fillCircle(26,8,22); cg.fillCircle(-22,10,18); cg.fillCircle(12,-12,16);
      cg.setPosition(x, y);
      this.clouds.push({ g: cg, spd });
    });

    // Ground
    const gnd = this.add.graphics();
    gnd.fillStyle(0x4a7a2a); gnd.fillRect(0, H-45, W, 45);
    gnd.fillStyle(0x5a8a3a); gnd.fillRect(0, H-48, W, 5);
    gnd.fillStyle(0x557722); gnd.fillRect(0, H-30, W, 8);
    for (let x=0; x<W; x+=65) { gnd.fillStyle(0xFFFF88,0.4); gnd.fillRect(x, H-22, 40, 6); }

    // Ground static body
    const groundRect = this.add.rectangle(W/2, H-22, W, 45).setVisible(false);
    this.physics.add.existing(groundRect, true);
    this.groundBody = groundRect;

    /* ── SKYSCRAPER ──────────────────────────────────── */
    const bx=590, bw=130, bTop=30;
    const bld = this.add.graphics();

    // Shadow
    bld.fillStyle(0x000000, 0.18); bld.fillRect(bx+8, bTop+8, bw, H-45-bTop);

    // Main building
    bld.fillStyle(0x4a6fa5); bld.fillRect(bx, bTop, bw, H-45-bTop);
    bld.fillStyle(0x5a7fb5); bld.fillRect(bx, bTop, bw, 6); // top trim

    // Glass panels
    bld.fillStyle(0x3a5f95, 0.5);
    for (let py=bTop+12; py<H-60; py+=32) bld.fillRect(bx+2, py, bw-4, 2);

    // Windows
    for (let row=bTop+14; row<H-60; row+=28) {
      for (let col=bx+10; col<bx+bw-10; col+=24) {
        bld.fillStyle(0xFFDD88, 0.85); bld.fillRect(col, row, 12, 14);
        bld.fillStyle(0xffffff, 0.3); bld.fillRect(col, row, 5, 4);
      }
    }

    // Outline
    bld.lineStyle(3, 0x2a4a7a); bld.strokeRect(bx, bTop, bw, H-45-bTop);

    // "TOILET CRISIS!" sign
    const signG = this.add.graphics();
    signG.fillStyle(0xFF2222); signG.fillRoundedRect(bx-8, bTop-30, bw+16, 28, 6);
    signG.lineStyle(2, 0x000); signG.strokeRoundedRect(bx-8, bTop-30, bw+16, 28, 6);
    this.add.text(bx+bw/2, bTop-16, '🚨 TOILET CRISIS! 🚨', {
      fontSize: '11px', fontFamily: 'Arial Black', color: '#fff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);

    /* ── CRANE ─────────────────────────────────────── */
    this.craneG = this.add.graphics();
    this._drawCrane();

    /* ── HANGING TOILET ──────────────────────────────── */
    this.hangX = bx - 36;
    this.hangBase = 155;
    this.hangContainer = this.add.container(this.hangX, this.hangBase);
    const rope = this.add.graphics();
    rope.lineStyle(4, 0x8B4513);
    rope.beginPath(); rope.moveTo(0, -35); rope.lineTo(0, 2); rope.strokePath();
    this.businessmanTxt = this.add.text(0, 2, '🚽\n😱', {
      fontSize: '32px', align: 'center', stroke: '#000', strokeThickness: 1
    }).setOrigin(0.5, 0);
    this.hangContainer.add([rope, this.businessmanTxt]);

    /* ── RESCUE PLATFORM ──────────────────────────────── */
    this.platX = bx - 80;
    this.platY = 262;
    this.platformG = this.add.graphics();
    this._drawPlatform();

    // Physics body for platform (bigger hitbox to catch pod)
    this.platRect = this.add.rectangle(this.platX+45, this.platY+6, 90, 28).setVisible(false);
    this.physics.add.existing(this.platRect, true);

    /* ── BILLBOARD ───────────────────────────────────── */
    this.bbX = 490; this.bbY = 195;
    this.billboardG = this.add.graphics();
    this._drawBillboard(0);
    this.add.text(this.bbX, this.bbY+15, 'YUKEN\nHYDRAULICS', {
      fontSize: '10px', fontFamily: 'Arial Black', color: '#000', align: 'center'
    }).setOrigin(0.5);

    /* ── LAUNCHER MACHINE ─────────────────────────────── */
    this.machineX = 98;
    this.machineY = 310;
    this.machineG   = this.add.graphics();
    this.pistonG    = this.add.graphics();
    this.gaugeNeedle= this.add.graphics();
    this._drawMachine(0);

    // Barrel tip: where pod launches from
    this.launchX = 175;
    this.launchY = 258;

    // Direction arrow preview
    this.arrowG = this.add.graphics();

    /* ── FANS ────────────────────────────────────────── */
    this.fanObjs = [];
    [[330, 195, 0x994444, 32], [460, 305, 0x444499, 28]].forEach(([fx, fy, col, r]) => {
      const fg = this.add.graphics();
      fg.setPosition(fx, fy);
      this.fanObjs.push({ g: fg, x: fx, y: fy, col, r, hit: r+14 });
    });

    /* ── HUD ─────────────────────────────────────────── */
    this._buildHUD();

    /* ── HOLD BUTTON ─────────────────────────────────── */
    this._buildHoldButton();

    /* ── TRAIL GRAPHIC ───────────────────────────────── */
    this.trailG = this.add.graphics();

    /* ── INPUT ───────────────────────────────────────── */
    this.input.on('pointerup', () => this._onRelease(), this);

    // Kick off first bird
    this.birdTimer = 3000;

    // Intro hint
    this._toast('😱 Rescue the businessman!\nHOLD the button to charge pressure!', 3500, '#FFE135');
  }

  /* ── CRANE ─────────────────────────────────────────── */
  _drawCrane() {
    const cx = 590, cy = 30;
    this.craneG.clear();
    this.craneG.lineStyle(7, 0x888888);
    const tx = cx-10 + Math.cos(this.craneAng)*75;
    const ty = cy + Math.sin(this.craneAng)*35;
    this.craneG.beginPath(); this.craneG.moveTo(cx-10, cy); this.craneG.lineTo(tx, ty); this.craneG.strokePath();
    this.craneG.lineStyle(3, 0xaaaaaa);
    this.craneG.beginPath(); this.craneG.moveTo(tx, ty); this.craneG.lineTo(tx, ty+22); this.craneG.strokePath();
    this.craneG.lineStyle(4, 0x666666); this.craneG.strokeCircle(tx+5, ty+28, 8);
  }

  /* ── PLATFORM ───────────────────────────────────────── */
  _drawPlatform() {
    this.platformG.clear();
    // Glow
    this.platformG.fillStyle(0x22FF66, 0.25); this.platformG.fillRect(this.platX-5, this.platY-8, 100, 30);
    this.platformG.fillStyle(0x22CC55); this.platformG.fillRect(this.platX, this.platY, 90, 14);
    this.platformG.lineStyle(3, 0x000); this.platformG.strokeRect(this.platX, this.platY, 90, 14);
    // Stripes
    for (let i=0; i<5; i++) {
      this.platformG.fillStyle(0xffffff, 0.3);
      this.platformG.fillRect(this.platX+8+i*16, this.platY+2, 8, 10);
    }
    this.add.text(this.platX+45, this.platY-16, '🎯 LAND HERE', {
      fontSize: '10px', fontFamily: 'Arial Black', color: '#22CC55', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5);
  }

  /* ── BILLBOARD ──────────────────────────────────────── */
  _drawBillboard(angle) {
    this.billboardG.clear();
    if (this.billboardHit) {
      this.billboardG.fillStyle(0x888888, 0.4);
      this.billboardG.fillRect(this.bbX-30, this.bbY+40, 60, 6);
      return;
    }
    this.billboardG.save();
    this.billboardG.fillStyle(0xFFFF44); this.billboardG.fillRect(this.bbX-32, this.bbY, 64, 36);
    this.billboardG.lineStyle(3, 0x000); this.billboardG.strokeRect(this.bbX-32, this.bbY, 64, 36);
    this.billboardG.fillStyle(0x555555); this.billboardG.fillRect(this.bbX-3, this.bbY+36, 6, 28);
    this.billboardG.restore();
  }

  /* ── LAUNCHER ───────────────────────────────────────── */
  _drawMachine(pressureAmt) {
    const mx = this.machineX, my = this.machineY;

    this.machineG.clear();
    // Shadow
    this.machineG.fillStyle(0x000000, 0.2);
    this.machineG.fillEllipse(mx, my+55, 150, 20);

    // Legs
    this.machineG.fillStyle(0x3a3a3a);
    this.machineG.fillRect(mx-55, my+35, 22, 28); this.machineG.fillRect(mx+33, my+35, 22, 28);
    // Feet
    this.machineG.fillStyle(0x555);
    this.machineG.fillRect(mx-62, my+58, 36, 8); this.machineG.fillRect(mx+26, my+58, 36, 8);

    // Main body
    this.machineG.fillStyle(0x666666); this.machineG.fillRoundedRect(mx-58, my-45, 116, 85, 12);
    this.machineG.fillStyle(0x777777); this.machineG.fillRoundedRect(mx-55, my-42, 110, 79, 10);
    this.machineG.lineStyle(3, 0x222); this.machineG.strokeRoundedRect(mx-58, my-45, 116, 85, 12);

    // Rivets
    this.machineG.fillStyle(0x444);
    [[mx-48, my-35],[mx+42, my-35],[mx-48, my+25],[mx+42, my+25]].forEach(([bx,by]) => {
      this.machineG.fillCircle(bx, by, 5);
      this.machineG.lineStyle(1, 0x888); this.machineG.strokeCircle(bx, by, 5);
    });

    // Pressure gauge
    this.machineG.fillStyle(0xDDDDDD); this.machineG.fillCircle(mx-28, my-12, 22);
    this.machineG.lineStyle(2, 0x333); this.machineG.strokeCircle(mx-28, my-12, 22);
    // Zone arcs
    this.machineG.lineStyle(4, 0x4488FF, 0.7);
    this.machineG.beginPath(); this.machineG.arc(mx-28, my-12, 16, Math.PI*0.9, Math.PI*1.4); this.machineG.strokePath();
    this.machineG.lineStyle(4, 0x22CC55, 0.7);
    this.machineG.beginPath(); this.machineG.arc(mx-28, my-12, 16, Math.PI*1.4, Math.PI*1.9); this.machineG.strokePath();
    this.machineG.lineStyle(4, 0xFF4444, 0.7);
    this.machineG.beginPath(); this.machineG.arc(mx-28, my-12, 16, Math.PI*1.9, Math.PI*2.4); this.machineG.strokePath();

    // Barrel (angled ~-28deg from horizontal)
    const barAngle = -0.49; // radians
    const barLen = 80, barThick = 14;
    const bx1=mx+22, by1=my-8;
    this.machineG.fillStyle(0x555555);
    // Draw barrel as a rotated quad
    const cos=Math.cos(barAngle), sin=Math.sin(barAngle);
    const pts = [
      [bx1 - sin*barThick/2, by1 + cos*barThick/2],
      [bx1 - sin*barThick/2 + cos*barLen, by1 + cos*barThick/2 + sin*barLen],
      [bx1 + sin*barThick/2 + cos*barLen, by1 - cos*barThick/2 + sin*barLen],
      [bx1 + sin*barThick/2, by1 - cos*barThick/2],
    ];
    this.machineG.fillPoints(pts.map(([x,y]) => ({ x, y })), true);
    this.machineG.lineStyle(2, 0x333);
    this.machineG.strokePoints(pts.map(([x,y]) => ({ x, y })), true);

    // Barrel mouth
    this.machineG.fillStyle(0x333);
    this.machineG.fillCircle(bx1+cos*barLen, by1+sin*barLen, 9);

    // YK-500 label
    this.machineG.fillStyle(0x222, 0.6); this.machineG.fillRoundedRect(mx-20, my+8, 74, 16, 4);

    // Piston cylinder
    this.pistonG.clear();
    const compress = pressureAmt * 0.3;
    this.pistonG.fillStyle(0x888888); this.pistonG.fillRect(mx-14, my-45-compress-35, 28, 32+compress);
    this.pistonG.lineStyle(2, 0x555); this.pistonG.strokeRect(mx-14, my-45-compress-35, 28, 32+compress);
    // Rod
    this.pistonG.fillStyle(0xCCCCCC); this.pistonG.fillRect(mx-7, my-78, 14, 8);
    this.pistonG.lineStyle(1, 0x888); this.pistonG.strokeRect(mx-7, my-78, 14, 8);
    // Steam puffs when over-pressure
    if (pressureAmt > 66) {
      this.pistonG.fillStyle(0xffffff, 0.4);
      for (let i=0; i<3; i++) {
        const r = 4+i*3;
        this.pistonG.fillCircle(mx+18+i*8, my-68-i*4, r);
      }
    }

    // Gauge needle
    this.gaugeNeedle.clear();
    const needleAng = Math.PI*0.9 + (pressureAmt/100)*Math.PI*1.5;
    const nx = mx-28, ny = my-12;
    this.gaugeNeedle.lineStyle(2, 0xFF2222);
    this.gaugeNeedle.beginPath();
    this.gaugeNeedle.moveTo(nx, ny);
    this.gaugeNeedle.lineTo(nx+Math.cos(needleAng)*15, ny+Math.sin(needleAng)*15);
    this.gaugeNeedle.strokePath();
    this.gaugeNeedle.fillStyle(0x333); this.gaugeNeedle.fillCircle(nx, ny, 3);
  }

  /* ── HUD ─────────────────────────────────────────────── */
  _buildHUD() {
    // Pressure meter at bottom
    const pH = H-40;
    this.pressureBgG = this.add.graphics();
    this.pressureBgG.fillStyle(0x222222, 0.85); this.pressureBgG.fillRoundedRect(60, pH-12, W-120, 24, 12);
    this.pressureBgG.lineStyle(2, 0x555); this.pressureBgG.strokeRoundedRect(60, pH-12, W-120, 24, 12);

    // Zone separators
    const barW = W-120, bx0=60;
    this.pressureBgG.lineStyle(1, 0xffffff, 0.3);
    this.pressureBgG.beginPath(); this.pressureBgG.moveTo(bx0+barW*0.33, pH-10); this.pressureBgG.lineTo(bx0+barW*0.33, pH+12); this.pressureBgG.strokePath();
    this.pressureBgG.beginPath(); this.pressureBgG.moveTo(bx0+barW*0.66, pH-10); this.pressureBgG.lineTo(bx0+barW*0.66, pH+12); this.pressureBgG.strokePath();

    this.pressureFill = this.add.graphics();

    // Zone labels
    const lblY = H-12;
    this.add.text(60+barW*0.165, lblY, '🔵 LOW', { fontSize: '9px', fontFamily: 'Arial Black', color: '#88aaff', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);
    this.add.text(60+barW*0.495, lblY, '🟢 PERFECT', { fontSize: '9px', fontFamily: 'Arial Black', color: '#44ff88', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);
    this.add.text(60+barW*0.83,  lblY, '🔴 OVER!', { fontSize: '9px', fontFamily: 'Arial Black', color: '#ff6644', stroke: '#000', strokeThickness: 1 }).setOrigin(0.5);

    // Score (top-right)
    this.scoreTxt = this.add.text(W-10, 10, '⭐ 0', {
      fontSize: '24px', fontFamily: 'Fredoka One', color: '#FFE135', stroke: '#000', strokeThickness: 4
    }).setOrigin(1, 0);

    // Combo (below score)
    this.comboTxt = this.add.text(W-10, 40, '', {
      fontSize: '16px', fontFamily: 'Fredoka One', color: '#FF6B6B', stroke: '#000', strokeThickness: 2
    }).setOrigin(1, 0).setAlpha(0);

    // Level label (top-left)
    this.add.text(10, 10, '🏢 Lv.1  Skyscraper Toilet Disaster', {
      fontSize: '12px', fontFamily: 'Arial', color: '#fff', stroke: '#000', strokeThickness: 2
    });
  }

  /* ── HOLD BUTTON ─────────────────────────────────────── */
  _buildHoldButton() {
    const bx = W/2, by = H-40;
    this.holdG = this.add.graphics();
    this._redrawHold(false);
    this.holdTxt = this.add.text(bx, by, '🔴 HOLD', {
      fontSize: '18px', fontFamily: 'Fredoka One', color: '#fff', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5);

    const hit = this.add.rectangle(bx, by, 110, 38).setInteractive().setAlpha(0.001).setDepth(99);
    hit.on('pointerdown', () => this._startCharge());
    hit.on('pointerup',   () => this._onRelease());
    hit.on('pointerout',  () => this._onRelease());
    this.holdHit = hit;
  }

  _redrawHold(active) {
    const bx=W/2, by=H-40;
    this.holdG.clear();
    this.holdG.fillStyle(active ? 0xAA0000 : 0xFF2222);
    this.holdG.fillRoundedRect(bx-55, by-19, 110, 38, 10);
    this.holdG.lineStyle(3, 0x000); this.holdG.strokeRoundedRect(bx-55, by-19, 110, 38, 10);
  }

  _startCharge() {
    if (this.launched || this.gameOver) return;
    this.isCharging = true;
    this._redrawHold(true);
    this.holdTxt.setText('⚡ CHARGING...');
  }

  _onRelease() {
    if (!this.isCharging || this.launched || this.gameOver) return;
    this.isCharging = false;
    this._redrawHold(false);
    this._launch();
  }

  /* ── LAUNCH ──────────────────────────────────────────── */
  _launch() {
    if (this.launched) return;
    this.launched = true;

    const p = this.pressure;
    let vx, vy;

    if (p < 33) {
      // Low — falls short
      vx = 150 + p*4;
      vy = -(80  + p*3);
    } else if (p < 66) {
      // Perfect — arc to platform
      const t = (p-33)/33; // 0..1
      vx = 370 + t*90;
      vy = -(220 + t*60);
    } else {
      // Over — chaos!
      const t = (p-66)/34;
      vx = 460 + t*280;
      vy = -(280 + t*200);
    }

    // Create pod (emoji text with physics)
    this.pod = this.add.text(this.launchX, this.launchY, '🚽', {
      fontSize: '30px', stroke: '#000', strokeThickness: 1
    }).setOrigin(0.5);
    this.physics.add.existing(this.pod);
    this.pod.body.setVelocity(vx, vy);
    this.pod.body.setCollideWorldBounds(false);

    // Collide with ground
    this.physics.add.collider(this.pod, this.groundBody, () => this._onGroundHit());
    // Overlap platform
    this.physics.add.overlap(this.pod, this.platRect, () => this._onPlatformHit());

    // Camera shake + effects
    this.cameras.main.shake(350, 0.012);
    this._spawnExplosion(this.launchX-20, this.launchY, 5, ['💨','⚡','🌟']);

    if (p >= 66) {
      // Over-pressure chaos
      this.cameras.main.shake(600, 0.025);
      this._spawnExplosion(this.machineX, this.machineY, 8, ['💥','🔥','⚡','💨']);
      this._toast('💥 OVERPRESSURE!! CHAOS MODE!!', 1600, '#FF6644');
    } else if (p >= 33) {
      this._toast('⚡ PERFECT PRESSURE! TURBO LAUNCH!', 1500, '#22FF88');
    } else {
      this._toast('😅 Too weak... more pressure next time!', 1800, '#88AAFF');
    }

    this.holdTxt.setText('⏳ In flight...');
    this.holdHit.disableInteractive();
    this.arrowG.clear();
    this.pressure = 0;
    this._updatePressureBar(0);
  }

  /* ── FANS ────────────────────────────────────────────── */
  _updateFans(dt) {
    this.fanObjs.forEach((fan, i) => {
      this.fanAngle[i] += (i===0 ? 3.5 : -2.8);
      const g = fan.g; g.clear();
      for (let b=0; b<4; b++) {
        const a = (this.fanAngle[i] + b*90) * Math.PI/180;
        g.fillStyle(fan.col, 0.88);
        g.fillTriangle(
          Math.cos(a)*6, Math.sin(a)*6,
          Math.cos(a+0.35)*fan.r, Math.sin(a+0.35)*fan.r,
          Math.cos(a-0.35)*fan.r, Math.sin(a-0.35)*fan.r
        );
      }
      g.fillStyle(0x888888); g.fillCircle(0,0,8);
      g.lineStyle(2, 0x444); g.strokeCircle(0,0,8);

      // Fan hub mount
      g.fillStyle(0x555); g.fillRect(-3,-fan.r-8,6,10);

      // Pod collision
      if (this.pod && !this.gameOver) {
        const dx = this.pod.x - fan.x, dy = this.pod.y - fan.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < fan.hit) {
          const nx=dx/dist, ny=dy/dist;
          this.pod.body.setVelocity(
            this.pod.body.velocity.x + nx*180 + (i===0?-60:60),
            this.pod.body.velocity.y + ny*100 - 80
          );
          this._addScore(60, fan.x, fan.y, '🌀 FAN!');
          this.cameras.main.shake(180, 0.007);
        }
      }
    });
  }

  /* ── BIRDS ───────────────────────────────────────────── */
  _updateBirds(dt) {
    this.birdTimer -= dt;
    if (this.birdTimer <= 0) {
      this.birdTimer = Phaser.Math.Between(2500, 5000);
      const y = Phaser.Math.Between(70, 200);
      const fromLeft = Math.random() > 0.5;
      const brd = this.add.text(fromLeft ? -30 : W+30, y, '🐦', { fontSize: '22px' });
      this.birds.push(brd);
      this.tweens.add({
        targets: brd,
        x: fromLeft ? W+50 : -50,
        duration: Phaser.Math.Between(2200, 3800),
        onComplete: () => { const idx=this.birds.indexOf(brd); if(idx>-1)this.birds.splice(idx,1); brd.destroy(); }
      });
    }

    if (this.pod && !this.gameOver) {
      this.birds.forEach(b => {
        if (!b.active) return;
        const dx=this.pod.x-b.x, dy=this.pod.y-b.y;
        if (Math.sqrt(dx*dx+dy*dy) < 28) {
          this.tweens.killTweensOf(b);
          b.setText('💀');
          this.tweens.add({ targets: b, y: b.y+70, alpha:0, duration:800, onComplete:()=>b.destroy() });
          this.pod.body.velocity.y -= 60;
          this._addScore(40, b.x, b.y, '🐦 BIRD!');
        }
      });
    }
  }

  /* ── BILLBOARD COLLISION ─────────────────────────────── */
  _checkBillboard() {
    if (this.billboardHit || !this.pod || this.gameOver) return;
    const dx=this.pod.x-this.bbX, dy=this.pod.y-(this.bbY+18);
    if (Math.abs(dx)<40 && Math.abs(dy)<25) {
      this.billboardHit = true;
      this._drawBillboard(0);
      this.pod.body.velocity.x *= -0.4;
      this.pod.body.velocity.y *= -0.3;
      this._addScore(80, this.bbX, this.bbY, '📢 BILLBOARD!');
      this.cameras.main.shake(250, 0.01);
      this._spawnExplosion(this.bbX, this.bbY, 5, ['💥','📢','🌟']);
    }
  }

  /* ── SCORE ───────────────────────────────────────────── */
  _addScore(pts, x, y, label) {
    const earned = Math.round(pts * this.combo);
    this.score += earned;
    this.scoreTxt.setText('⭐ ' + this.score);
    this.combo = Math.min(this.combo + 0.5, 6);
    this.comboTxt.setText('x' + this.combo.toFixed(1) + ' COMBO!').setAlpha(1);
    this.tweens.add({ targets: this.comboTxt, alpha: 0, duration: 1400, delay: 500 });

    // Floating popup
    const pop = this.add.text(x||W/2, y||H/2, '+'+earned+' '+label, {
      fontSize: '18px', fontFamily: 'Fredoka One', color: '#FFE135', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(90);
    this.tweens.add({ targets: pop, y: (y||H/2)-55, alpha: 0, duration: 1000, onComplete: () => pop.destroy() });
  }

  /* ── WIN ─────────────────────────────────────────────── */
  _onPlatformHit() {
    if (this.gameOver) return;
    this.gameOver = true;

    // Bonus for airtime + remaining speed
    const bonus = Math.round(this.airtime/8) + 200;
    this._addScore(bonus, this.platX+45, this.platY, '🎯 RESCUE!');

    const best = parseInt(localStorage.getItem('hm_best')||'0');
    if (this.score > best) localStorage.setItem('hm_best', this.score);

    this.physics.pause();
    this.pod.setText('🎊');
    this.businessmanTxt.setText('😁\n🎉');

    this.cameras.main.shake(500, 0.018);
    this._spawnCelebration();

    this.time.delayedCall(500, () => {
      this._showEndPanel(true);
    });
  }

  /* ── FAIL ─────────────────────────────────────────────── */
  _onGroundHit() {
    if (this.gameOver) return;
    if (Math.abs(this.pod.body.velocity.x) < 10 && Math.abs(this.pod.body.velocity.y) < 30) {
      // Genuinely stopped
      if (this.gameOver) return;
      this.gameOver = true;
      this.physics.pause();
      this._spawnExplosion(this.pod.x, this.pod.y, 6, ['💥','🌭','😂']);
      this.pod.setText('💥');
      this.time.delayedCall(600, () => this._showEndPanel(false));
    }
  }

  _checkOutOfBounds() {
    if (!this.pod || this.gameOver) return;
    if (this.pod.x > W+80 || this.pod.x < -80 || this.pod.y > H+80) {
      this.gameOver = true;
      this.physics.pause();
      this.pod.setText('🚀');
      this._spawnExplosion(this.pod.x, this.pod.y, 5, ['🚀','💫','⭐']);
      this.time.delayedCall(400, () => this._showEndPanel(false));
    }
  }

  /* ── END PANEL ───────────────────────────────────────── */
  _showEndPanel(won) {
    const ov = this.add.graphics().setDepth(200);
    ov.fillStyle(0x000000, 0.7); ov.fillRect(0, 0, W, H);

    const bx=W/2, by=H/2-30;
    const panG = this.add.graphics().setDepth(201);
    panG.fillStyle(won ? 0x1a5a1a : 0x5a1a1a);
    panG.fillRoundedRect(bx-240, by-130, 480, 300, 22);
    panG.lineStyle(4, won ? 0x44FF88 : 0xFF6644);
    panG.strokeRoundedRect(bx-240, by-130, 480, 300, 22);

    // Icon + title
    const icon = won ? '🎉' : Phaser.Utils.Array.GetRandom(['😱','💩','🌭','🚀']);
    this.add.text(bx, by-108, icon, { fontSize: '52px' }).setOrigin(0.5).setDepth(202);

    const msg = won
      ? CONTENT.winTitle
      : Phaser.Utils.Array.GetRandom(CONTENT.failMsgs);

    this.add.text(bx, by-48, msg, {
      fontSize: '20px', fontFamily: 'Fredoka One, Arial Black',
      color: '#fff', stroke: '#000', strokeThickness: 3,
      align: 'center', wordWrap: { width: 420 }, lineSpacing: 6
    }).setOrigin(0.5).setDepth(202);

    // Score
    const best = localStorage.getItem('hm_best');
    this.add.text(bx, by+30, `⭐ Score: ${this.score}  🏆 Best: ${best||'---'}`, {
      fontSize: '18px', fontFamily: 'Fredoka One', color: '#FFE135', stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5).setDepth(202);

    // Stars (1-3 based on score)
    const stars = this.score >= 400 ? 3 : this.score >= 200 ? 2 : 1;
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
    this.add.text(bx, by+58, starStr, { fontSize: '30px' }).setOrigin(0.5).setDepth(202);

    // Yuken tip (win only)
    if (won) {
      this.add.text(bx, by+90, CONTENT.winHint, {
        fontSize: '11px', fontFamily: 'Arial', color: '#aaddff',
        align: 'center', wordWrap: { width: 420 }
      }).setOrigin(0.5).setDepth(202);
    }

    // Buttons
    this._endBtn(bx-65, by+138, 120, 38, 0xFF4444, won?'🔄 Again':'💪 Retry', () => {
      this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.restart());
    }, 202);
    this._endBtn(bx+75, by+138, 120, 38, 0x226699, '🏠 Menu', () => {
      this.cameras.main.fadeOut(300);
      this.time.delayedCall(300, () => this.scene.start('MenuScene'));
    }, 202);
  }

  _endBtn(cx, cy, bw, bh, col, label, cb, depth) {
    const g = this.add.graphics().setDepth(depth);
    g.fillStyle(col); g.fillRoundedRect(cx-bw/2, cy-bh/2, bw, bh, 10);
    g.lineStyle(3, 0x000); g.strokeRoundedRect(cx-bw/2, cy-bh/2, bw, bh, 10);
    this.add.text(cx, cy, label, {
      fontSize: '17px', fontFamily: 'Fredoka One', color: '#fff', stroke: '#000', strokeThickness: 2
    }).setOrigin(0.5).setDepth(depth+1);
    const hit = this.add.rectangle(cx, cy, bw, bh).setInteractive().setAlpha(0.001).setDepth(depth+2);
    hit.on('pointerdown', cb);
  }

  /* ── PARTICLES ───────────────────────────────────────── */
  _spawnExplosion(x, y, count, emojis) {
    for (let i=0; i<count; i++) {
      const e = this.add.text(x, y, Phaser.Utils.Array.GetRandom(emojis), { fontSize: '22px' }).setOrigin(0.5).setDepth(80);
      const ang = Math.random()*Math.PI*2, spd = 70+Math.random()*110;
      this.tweens.add({
        targets: e,
        x: x + Math.cos(ang)*spd,
        y: y + Math.sin(ang)*spd,
        alpha: 0, scaleX: 1.8, scaleY: 1.8,
        duration: 700+Math.random()*300,
        delay: i*50,
        onComplete: () => e.destroy()
      });
    }
  }

  _spawnCelebration() {
    const emojis = ['🎉','⭐','🌟','✨','🎊','😸','🏆'];
    for (let i=0; i<28; i++) {
      this.time.delayedCall(i*70, () => {
        const e = this.add.text(
          Phaser.Math.Between(80, W-80),
          Phaser.Math.Between(30, H/2),
          Phaser.Utils.Array.GetRandom(emojis),
          { fontSize: (24+Math.random()*14)+'px' }
        ).setDepth(85);
        this.tweens.add({ targets: e, y: e.y-90, alpha: 0, scaleX: 1.4, scaleY: 1.4, duration: 1100+Math.random()*500, onComplete: () => e.destroy() });
      });
    }
  }

  /* ── TOAST ───────────────────────────────────────────── */
  _toast(msg, dur, col) {
    if (this._toastObj) { this._toastObj.destroy(); if(this._toastBg)this._toastBg.destroy(); }
    const bg = this.add.graphics().setDepth(95);
    bg.fillStyle(0x000000, 0.72); bg.fillRoundedRect(W/2-200, H/2-80, 400, 60, 14);
    const t = this.add.text(W/2, H/2-50, msg, {
      fontSize: '15px', fontFamily: 'Fredoka One', color: col||'#FFE135',
      stroke: '#000', strokeThickness: 3, align: 'center', lineSpacing: 4
    }).setOrigin(0.5).setDepth(96);
    this._toastBg = bg; this._toastObj = t;
    this.tweens.add({ targets: [bg, t], alpha: 0, duration: 400, delay: dur-400, onComplete: () => { bg.destroy(); t.destroy(); } });
  }

  /* ── PRESSURE BAR ─────────────────────────────────────── */
  _updatePressureBar(p) {
    const bx0=60, bW=W-120, pH=H-40;
    this.pressureFill.clear();
    if (p <= 0) return;
    const fill = bW*(p/100);
    let col;
    if (p < 33) col = 0x4488FF;
    else if (p < 66) col = 0x22CC55;
    else col = 0xFF4444;
    // Pulsing alpha when in zone
    const alpha = p>=33 && p<66 ? 0.9+Math.sin(Date.now()*0.015)*0.1 : 1;
    this.pressureFill.fillStyle(col, alpha);
    this.pressureFill.fillRoundedRect(bx0, pH-12, fill, 24, 12);
    // Shine
    this.pressureFill.fillStyle(0xffffff, 0.15);
    this.pressureFill.fillRoundedRect(bx0, pH-12, fill, 10, 6);
  }

  /* ── UPDATE ──────────────────────────────────────────── */
  update(time, delta) {
    // Clouds
    this.clouds.forEach(c => {
      c.g.x -= c.spd * delta/1000;
      if (c.g.x < -100) c.g.x = W+80;
    });

    // Crane swing
    this.craneAng += this.craneDir * 0.007;
    if (this.craneAng > 0.45) this.craneDir = -1;
    if (this.craneAng < -0.45) this.craneDir = 1;
    this._drawCrane();

    // Businessman sway
    this.hangContainer.x = this.hangX + Math.sin(time*0.0009)*14;

    // Fans
    this._updateFans(delta);

    // Birds
    this._updateBirds(delta);

    // Charging mechanics
    if (this.isCharging && !this.launched) {
      this.pressure = Math.min(100, this.pressure + 1.1);
      this._updatePressureBar(this.pressure);
      this._drawMachine(this.pressure);

      // Machine shake
      const sh = (this.pressure/100)*4;
      this.machineG.x = Phaser.Math.Between(-sh, sh);
      this.machineG.y = Phaser.Math.Between(-sh, sh);

      // Arrow preview
      this.arrowG.clear();
      const p = this.pressure;
      let vx,vy;
      if (p<33){vx=150+p*4;vy=-(80+p*3);}
      else if(p<66){const t=(p-33)/33;vx=370+t*90;vy=-(220+t*60);}
      else{const t=(p-66)/34;vx=460+t*280;vy=-(280+t*200);}
      // Show trajectory dots
      this.arrowG.fillStyle(0xffffff, 0.35);
      for (let step=1; step<=8; step++) {
        const t2 = step*0.12;
        const px = this.launchX + vx*t2;
        const py = this.launchY + vy*t2 + 0.5*300*t2*t2;
        if (px>0&&px<W&&py>0&&py<H) {
          const r = Math.max(1, 5-step*0.4);
          this.arrowG.fillCircle(px, py, r);
        }
      }
    }

    // Pod in flight
    if (this.pod && this.launched && !this.gameOver) {
      this.airtime += delta;

      // Rotate pod with velocity direction
      const vx = this.pod.body.velocity.x, vy = this.pod.body.velocity.y;
      this.pod.angle = Math.atan2(vy, vx) * 180/Math.PI * 0.5;

      // Trail
      this.trailPts.push({ x: this.pod.x, y: this.pod.y });
      if (this.trailPts.length > 14) this.trailPts.shift();
      this.trailG.clear();
      this.trailPts.forEach((pt, i) => {
        const a = (i/this.trailPts.length)*0.3;
        this.trailG.fillStyle(0x88CCFF, a);
        this.trailG.fillCircle(pt.x, pt.y, 3 - i*0.15);
      });

      // Billboard
      this._checkBillboard();

      // Out of bounds
      this._checkOutOfBounds();

      // Slow-moving on ground (friction stop)
      if (this.pod.body.blocked.down) {
        this.pod.body.velocity.x *= 0.88;
        if (Math.abs(this.pod.body.velocity.x) < 15 && !this.gameOver) {
          this.gameOver = true;
          this.physics.pause();
          this._spawnExplosion(this.pod.x, this.pod.y, 5, ['💥','🌭','😂']);
          this.pod.setText('💥');
          this.time.delayedCall(700, () => this._showEndPanel(false));
        }
      }
    }
  }
}

    arcade: { gravity: { y: 300 }, debug: false }
  },
  scene: [MenuScene, GameScene],

};

new Phaser.Game(config);
